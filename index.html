<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GemFit ♊ — Deivis & Yona</title>

<!-- Sin caché — siempre carga la versión más reciente -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<!-- iOS Web App -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GemFit">
<meta name="theme-color" content="#0a0a0a">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0a0a0a;--card:#111111;--card2:#161616;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#e8e8e8;--muted:#666;--muted2:#444;
  --push:#cc5500;--pull:#2277cc;--legs:#7733cc;--done:#22aa66;--skip:#444;
  --accent:#cc5500;--yona:#7733cc;
}
html{height:100%;}
body{
  background:#0a0a0a;color:var(--text);
  font-family:'DM Sans',sans-serif;font-size:14px;
  height:100%;overflow:hidden;
  display:flex;flex-direction:column;
}

/* ── SCREENS ── */
.screen{display:none;flex-direction:column;height:100%;overflow:hidden;}
.screen.active{display:flex;}

/* ── PROFILE SCREEN ── */
#s-profiles{align-items:center;justify-content:center;padding:24px;gap:0;overflow-y:auto;background:#0a0a0a;}
.gem-logo-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;}
.gem-title{font-family:'Bebas Neue',sans-serif;font-size:2.4rem;letter-spacing:.15em;
  background:linear-gradient(135deg,#ff8c42,#c0006e,#7209b7);-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;background-clip:text;}
.gem-sub{font-size:11px;color:#5a6a7a;letter-spacing:.15em;text-transform:uppercase;}
.prof-cards{display:flex;gap:12px;width:100%;max-width:340px;}
.pcard{flex:1;padding:20px 14px;border-radius:16px;border:1px solid var(--border);
  background:var(--card);cursor:pointer;text-align:center;transition:all .2s;}
.pcard:hover{transform:translateY(-4px);border-color:var(--pc,var(--accent));}
.pav{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:1.7rem;margin:0 auto 10px;}
.pname{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:.08em;margin-bottom:6px;}
.pmeta{font-size:11px;color:var(--muted2);line-height:1.8;}
.imc-chip{display:inline-block;margin-top:6px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;}

/* ── TOPBAR ── */
.topbar{
  display:flex;align-items:center;gap:10px;padding:10px 14px;
  background:rgba(10,10,10,0.97);border-bottom:1px solid rgba(255,255,255,0.06);
  flex-shrink:0;z-index:10;
}
.tlogo{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;cursor:pointer;font-size:14px;border:1px solid;flex-shrink:0;}
.tname{font-family:'Bebas Neue',sans-serif;font-size:1.15rem;letter-spacing:.08em;flex:1;}
.tright{font-size:10px;color:var(--muted2);text-transform:uppercase;letter-spacing:.08em;}

/* ── MAIN CONTENT AREA ── */
.main-area{flex:1;overflow:hidden;position:relative;}
.tab{
  position:absolute;inset:0;
  overflow-y:auto;
  display:none;
  -webkit-overflow-scrolling:touch;
}
.tab.active{display:block;}
.tab::-webkit-scrollbar{width:3px;}
.tab::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.inner{padding:14px 14px 80px;max-width:900px;margin:0 auto;}

/* ── BOTTOM NAV ── */
.bnav{
  flex-shrink:0;
  background:rgba(10,10,10,0.97);border-top:1px solid rgba(255,255,255,0.06);
  display:none;height:62px;z-index:10;
}
.bnav.on{display:flex;}
.nbtn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;border:none;background:none;cursor:pointer;color:var(--muted);
  font-size:9px;letter-spacing:.06em;text-transform:uppercase;transition:color .2s;padding:0;}
.nbtn.active{color:var(--accent);}
.nbtn-icon{font-size:16px;line-height:1;transition:transform .2s;}
.nbtn.active .nbtn-icon{transform:translateY(-2px);}

/* ── SHARED ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:12px;}
.card-body{padding:14px 16px;}
.section-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.14em;margin-bottom:10px;}
.h1{font-family:'Bebas Neue',sans-serif;letter-spacing:.02em;line-height:.9;}
.mono{font-family:'DM Mono',monospace;}
.bebas{font-family:'Bebas Neue',sans-serif;}

/* ── PLAN TAB ── */
.week-pills{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:16px;}
.wpill{padding:6px 2px;border-radius:8px;text-align:center;border:1px solid var(--border);}
.wpill-day{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px;}
.wpill-type{font-family:'Bebas Neue',sans-serif;font-size:11px;}
.day-block{margin-bottom:14px;}
.day-hdr{display:flex;align-items:center;gap:8px;padding:9px 13px;border-radius:10px 10px 0 0;border:1px solid;border-bottom:none;}
.day-badge{font-size:9px;text-transform:uppercase;letter-spacing:.1em;padding:2px 7px;border-radius:3px;font-weight:600;}
.day-title{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.04em;flex:1;}
.day-dur{font-size:10px;color:var(--muted);}
.ex-table{border:1px solid var(--border);border-radius:0 0 10px 10px;overflow:hidden;}
.ex-section{padding:4px 13px;background:rgba(255,255,255,.025);font-size:9px;
  color:var(--muted);text-transform:uppercase;letter-spacing:.12em;border-bottom:1px solid var(--border);}
.ex-row{display:grid;grid-template-columns:22px 1fr auto;gap:8px;align-items:start;
  padding:8px 13px;border-bottom:1px solid var(--border);}
.ex-row:last-child{border-bottom:none;}
.ex-row.cardio-row{background:rgba(200,241,53,.04);}
.ex-row.star-row{border-left:2px solid gold;}
.ex-num{font-size:10px;color:var(--muted);padding-top:2px;}
.ex-name{font-size:12px;font-weight:500;line-height:1.3;}
.ex-note{font-size:10px;color:var(--muted);margin-top:2px;line-height:1.4;}
.ex-why{font-size:10px;color:#cc5500;margin-top:2px;font-style:italic;}
.ex-sets{font-family:'DM Mono',monospace;font-size:10px;white-space:nowrap;padding-top:2px;}

/* ── VOLUME TABLE ── */
.vol-grid{display:grid;grid-template-columns:1fr auto auto auto;gap:0;border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.vol-hdr{background:rgba(255,255,255,.04);padding:7px 10px;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;border-bottom:1px solid var(--border);}
.vol-cell{padding:8px 10px;border-bottom:1px solid var(--border);font-size:12px;}
.vol-cell:nth-last-child(-n+4){border-bottom:none;}
.vol-muscle{font-weight:500;}
.vol-bar-wrap{display:flex;align-items:center;gap:6px;padding:8px 10px;border-bottom:1px solid var(--border);}
.vol-bar-wrap:nth-last-child(-n+4){border-bottom:none;}
.vol-bar-bg{flex:1;height:4px;background:var(--border);border-radius:99px;overflow:hidden;}
.vol-bar-fill{height:100%;border-radius:99px;}

/* ── TRACKER TAB ── */
.month-nav{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 6px;}
.month-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);
  background:var(--card);color:var(--text);cursor:pointer;font-size:15px;}
.month-label{font-family:'Bebas Neue',sans-serif;font-size:1.7rem;letter-spacing:.04em;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-wd{text-align:center;font-size:9px;color:var(--muted);padding:3px 0;
  text-transform:uppercase;letter-spacing:.05em;}
.cal-cell{aspect-ratio:1;border-radius:6px;border:1px solid var(--border);
  background:var(--card);cursor:pointer;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:2px;transition:all .12s;}
.cal-cell:hover{background:var(--card2);}
.cal-cell.empty{background:transparent;border-color:transparent;cursor:default;}
.cal-cell.today{border-color:var(--accent);}
.cal-cell.selected{background:rgba(200,241,53,.1);border-color:var(--accent);}
.cal-cell.skipped{opacity:.5;}
.cal-num{font-size:11px;font-weight:500;line-height:1;}
.cal-dot{width:5px;height:5px;border-radius:50%;}
.cal-chk{font-size:9px;color:var(--done);}
.day-panel{margin:0 14px;border:1px solid var(--border);border-radius:12px;overflow:hidden;background:var(--card);}
.sess-selector{padding:11px 13px;border-bottom:1px solid var(--border);}
.sess-btns{display:flex;flex-wrap:wrap;gap:4px;margin-top:7px;}
.sess-btn{padding:4px 10px;border-radius:6px;border:1px solid var(--border2);
  background:var(--card2);color:var(--muted);font-size:11px;font-weight:500;cursor:pointer;}
.prog-wrap{padding:8px 13px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.prog-bg{flex:1;height:4px;background:var(--border);border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;border-radius:99px;transition:width .3s;}
.prog-txt{font-size:10px;color:var(--muted);white-space:nowrap;}
.prog-pct{font-family:'Bebas Neue',sans-serif;font-size:13px;min-width:34px;text-align:right;}
.t-section{padding:4px 13px;background:rgba(255,255,255,.02);font-size:9px;
  color:var(--muted);text-transform:uppercase;letter-spacing:.12em;border-bottom:1px solid var(--border);}
.t-ex{display:flex;align-items:flex-start;gap:9px;padding:8px 13px;
  border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;user-select:none;}
.t-ex:last-child{border-bottom:none;}
.t-ex:hover{background:rgba(255,255,255,.02);}
.t-ex.done{opacity:.42;}
.t-ex.cardio{background:rgba(200,241,53,.03);}
.chkbox{width:18px;height:18px;border-radius:4px;border:1.5px solid var(--border2);
  background:var(--card2);display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:2px;transition:all .12s;}
.chkbox.on{background:#007a40;border-color:#007a40;}
.t-ex-name{font-size:12px;font-weight:500;line-height:1.3;}
.t-ex-note{font-size:10px;color:var(--muted);margin-top:2px;}
.t-ex-sets{font-family:'DM Mono',monospace;font-size:10px;white-space:nowrap;padding-top:2px;flex-shrink:0;}
.notes-wrap{padding:11px 13px;border-top:1px solid var(--border);}
.notes-ta{width:100%;background:var(--card2);border:1px solid var(--border2);border-radius:8px;
  color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;
  padding:8px 10px;resize:none;min-height:64px;line-height:1.5;margin-top:6px;}
.notes-ta:focus{outline:none;border-color:#00994d;}
.note-save{margin-top:6px;padding:5px 12px;border:none;border-radius:6px;
  font-size:11px;font-weight:600;cursor:pointer;transition:all .2s;}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin:12px 14px 0;}
.stat-card{padding:8px;background:var(--card);border:1px solid var(--border);border-radius:8px;text-align:center;}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:1.35rem;line-height:1;}
.stat-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:2px;}
.done-banner{margin:0 14px 10px;padding:9px 12px;border-radius:9px;
  background:rgba(204,85,0,.07);border:1px solid rgba(204,85,0,.2);
  font-size:12px;color:#00994d;display:none;align-items:center;gap:8px;}
.done-banner.on{display:flex;}

/* ── PERFIL TAB ── */
.imc-inputs{display:flex;gap:8px;margin-bottom:12px;}
.imc-inp{flex:1;background:var(--card2);border:1px solid var(--border2);border-radius:8px;
  color:var(--text);font-size:13px;padding:7px 10px;}
.imc-inp:focus{outline:none;border-color:var(--accent);}
.imc-result-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;
  padding:10px;background:var(--card2);border-radius:8px;border:1px solid var(--border);margin-bottom:10px;}
.imc-m{text-align:center;}
.imc-v{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;line-height:1;}
.imc-l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-top:3px;}
.imc-track{height:8px;border-radius:99px;
  background:linear-gradient(to right,#3b82f6 0%,#4ade80 20%,#c8f135 27%,#ff6b35 33%,#ef4444 45%);
  position:relative;margin:6px 0;}
.imc-marker{position:absolute;top:-3px;width:14px;height:14px;border-radius:50%;
  background:#fff;border:2px solid #0a0a0a;transform:translateX(-50%);transition:left .4s;
  box-shadow:0 0 6px rgba(255,255,255,.3);}
.imc-cat{text-align:center;font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:.05em;margin-top:6px;}
.macro-sel-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.macro-sel{background:var(--card2);border:1px solid var(--border2);border-radius:8px;
  color:var(--text);font-size:12px;padding:6px 8px;}
.macro-sel:focus{outline:none;border-color:var(--accent);}
.macro-result-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.macro-card{padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--card2);text-align:center;}
.macro-v{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;line-height:1;}
.macro-l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-top:2px;}
.macro-s{font-size:10px;color:var(--muted);margin-top:2px;}

/* ── PROGRESO TAB ── */
.streak-wrap{display:flex;align-items:center;gap:14px;padding:13px 15px;}
.streak-num{font-family:'Bebas Neue',sans-serif;font-size:3.2rem;line-height:1;}
.w-input-row{display:flex;gap:8px;margin-bottom:10px;}
.w-inp{flex:1;background:var(--card2);border:1px solid var(--border2);border-radius:8px;
  color:var(--text);font-size:13px;padding:7px 10px;}
.w-inp:focus{outline:none;border-color:var(--accent);}
.w-add-btn{padding:7px 14px;background:#cc5500;color:#ffffff;border:none;
  border-radius:8px;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:.06em;cursor:pointer;}
.w-entry{display:flex;justify-content:space-between;align-items:center;
  padding:7px 10px;background:var(--card2);border-radius:7px;border:1px solid var(--border);margin-bottom:4px;}
.w-date{font-size:11px;color:var(--muted);}
.w-val{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;}
.w-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;padding:2px 4px;}
.chart-area{height:140px;display:flex;align-items:flex-end;gap:3px;padding-bottom:20px;position:relative;}
.chart-col{flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;height:100%;position:relative;}
.chart-bars{display:flex;gap:1px;align-items:flex-end;width:100%;justify-content:center;}
.chart-bar{width:30%;border-radius:2px 2px 0 0;min-height:0;transition:height .3s;}
.chart-label{position:absolute;bottom:0;font-size:8px;color:var(--muted);text-align:center;line-height:1;white-space:nowrap;}
.chart-legend{display:flex;gap:12px;margin-top:8px;flex-wrap:wrap;}
.legend-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted);}
.legend-dot{width:7px;height:7px;border-radius:50%;}

/* ── SUPLEMENTOS TAB ── */
.sup-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.sup-tab{padding:5px 12px;border-radius:7px;border:1px solid var(--border2);
  background:var(--card2);color:var(--muted);font-size:11px;cursor:pointer;transition:all .15s;}
.sup-tab.active{background:rgba(204,85,0,.1);border-color:#cc5500;color:#cc5500;}
.sup-card{background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:12px 14px;margin-bottom:10px;position:relative;overflow:hidden;}
.sup-accent{position:absolute;top:0;left:0;width:3px;height:100%;}
.sup-inner{padding-left:10px;}
.sup-name{font-size:13px;font-weight:500;margin-bottom:2px;}
.sup-dose{font-size:11px;color:var(--muted);margin-bottom:7px;}
.sup-verdict{font-size:10px;padding:2px 8px;border-radius:5px;font-weight:600;display:inline-block;margin-bottom:8px;}
.sup-why{font-size:11px;color:var(--muted);line-height:1.6;background:var(--card2);
  border-radius:7px;padding:8px 10px;border-left:2px solid;}
.sup-tag{font-size:10px;padding:2px 7px;border-radius:5px;margin-right:4px;margin-bottom:5px;display:inline-block;}
.tl-row{display:grid;grid-template-columns:90px 1fr;border-bottom:1px solid var(--border);}
.tl-row:last-child{border-bottom:none;}
.tl-time{padding:12px 10px 12px 0;font-size:11px;font-weight:500;color:var(--muted);padding-top:14px;}
.tl-items{padding:8px 0;display:flex;flex-direction:column;gap:5px;}
.tl-item{display:flex;align-items:center;gap:7px;padding:5px 9px;border-radius:7px;background:var(--card2);}
.tl-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.tl-name{font-size:12px;flex:1;}
.tl-dose{font-size:10px;color:var(--muted);white-space:nowrap;}
.chk-item{display:flex;align-items:center;gap:9px;padding:8px 11px;background:var(--card);
  border:1px solid var(--border);border-radius:9px;cursor:pointer;margin-bottom:6px;}
.chk-box{width:18px;height:18px;border-radius:4px;border:1.5px solid var(--border2);
  background:var(--card2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.chk-box.on{background:#007a40;border-color:#007a40;}
.chk-name{font-size:12px;font-weight:500;flex:1;}
.chk-sub{font-size:10px;color:var(--muted);}
.chk-badge{font-size:10px;padding:2px 7px;border-radius:5px;white-space:nowrap;}
.prog-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.prog-bar-bg{flex:1;height:5px;background:var(--border);border-radius:99px;overflow:hidden;}
.prog-bar-fill{height:100%;border-radius:99px;background:var(--done);transition:width .3s;}
.prog-bar-lbl{font-size:11px;color:var(--muted);white-space:nowrap;}
</style>
</head>
<body>

<!-- ═══════════════ PROFILE SCREEN ═══════════════ -->
<input type="file" id="iosPhotoInput" accept="image/*" style="display:none">
<div id="s-profiles" class="screen active">
  <!-- Logo -->
  <div style="text-align:center;padding:40px 24px 28px;">
    <div style="font-family:'Bebas Neue',sans-serif;font-size:2.8rem;letter-spacing:.2em;color:#e8e8e8;">GEMFIT</div>
    <div style="font-size:10px;color:#333;letter-spacing:.2em;text-transform:uppercase;margin-top:2px;">¿Quién entrena hoy?</div>
  </div>

  <!-- Cards -->
  <div style="display:flex;flex-direction:column;gap:10px;padding:0 20px 40px;width:100%;max-width:420px;margin:0 auto;">

    <!-- DEIVIS -->
    <div onclick="selectProfile('deivis')" style="
      background:#111;border:0.5px solid #1e1e1e;border-radius:16px;
      overflow:hidden;cursor:pointer;transition:border-color .2s;"
      onmouseover="this.style.borderColor='#cc5500'" onmouseout="this.style.borderColor='#1e1e1e'">
      <div style="height:3px;background:#cc5500;"></div>
      <div style="padding:18px 16px;display:flex;align-items:center;gap:14px;">
        <div id="pav-deivis" onclick="event.stopPropagation();avatarTap('deivis')"
          style="width:64px;height:64px;border-radius:50%;background:#1a1a1a;border:1.5px solid #2a2a2a;
          display:flex;align-items:center;justify-content:center;
          font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:#cc5500;
          cursor:pointer;overflow:hidden;position:relative;flex-shrink:0;">
          <span id="pav-txt-deivis">D</span>
          <img id="pav-img-deivis" src="" style="display:none;width:100%;height:100%;object-fit:cover;position:absolute;inset:0;border-radius:50%;">
          <div style="position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.5);font-size:8px;color:#fff;text-align:center;padding:2px 0;">📷</div>

let _avatarEditProfile = null;
let _avatarEditImg = null;
let _edX = 0, _edY = 0, _edScale = 1;
let _dragging = false, _lastTX = 0, _lastTY = 0;
let _pinchDist = 0;
const EDITOR_SIZE = 280, CIRCLE_R = 118;

function changeAvatar(profileId){

function openAvatarEditor(img){
  const modal = document.getElementById('avatarEditorModal');
  const edImg = document.getElementById('avatarEditorImg');
  const slider = document.getElementById('zoomSlider');

  // Fit image to fill the circle initially
  const fitScale = Math.max(
    (CIRCLE_R*2) / img.width,
    (CIRCLE_R*2) / img.height
  );
  _edScale = fitScale;
  // Center image in editor
  _edX = (EDITOR_SIZE - img.width * _edScale) / 2;
  _edY = (EDITOR_SIZE - img.height * _edScale) / 2;

  edImg.src = img.src;
  slider.value = Math.round(_edScale * 100);
  document.getElementById('zoomLabel').textContent = Math.round(_edScale*100)+'%';

  applyEditorTransform();
  updatePreview();
  modal.style.display = 'flex';
  setupEditorEvents();
}

function applyEditorTransform(){
  const edImg = document.getElementById('avatarEditorImg');
  if(!edImg||!_avatarEditImg) return;
  edImg.style.width  = (_avatarEditImg.width  * _edScale)+'px';
  edImg.style.height = (_avatarEditImg.height * _edScale)+'px';
  edImg.style.left   = _edX+'px';
  edImg.style.top    = _edY+'px';
}

function clampPosition(){
  if(!_avatarEditImg) return;
  const iw = _avatarEditImg.width  * _edScale;
  const ih = _avatarEditImg.height * _edScale;
  const cx = EDITOR_SIZE/2, cy = EDITOR_SIZE/2;
  // Image must cover the circle
  const minX = cx + CIRCLE_R - iw;
  const maxX = cx - CIRCLE_R;
  const minY = cy + CIRCLE_R - ih;
  const maxY = cy - CIRCLE_R;
  _edX = Math.max(minX, Math.min(maxX, _edX));
  _edY = Math.max(minY, Math.min(maxY, _edY));
}

function updatePreview(){
  const canvas = document.createElement('canvas');
  canvas.width = 200; canvas.height = 200;
  const ctx = canvas.getContext('2d');
  ctx.beginPath();
  ctx.arc(100,100,100,0,Math.PI*2);
  ctx.clip();
  const scaleToPreview = 200/EDITOR_SIZE;
  const sx = (_edX - (EDITOR_SIZE/2 - CIRCLE_R)) / _edScale;
  const sy = (_edY - (EDITOR_SIZE/2 - CIRCLE_R)) / _edScale;
  const sSize = (CIRCLE_R*2) / _edScale;
  ctx.drawImage(_avatarEditImg, -sx, -sy,
    _avatarEditImg.width * _edScale * scaleToPreview,
    _avatarEditImg.height * _edScale * scaleToPreview);
  // Re-draw cropped
  ctx.clearRect(0,0,200,200);
  ctx.beginPath();
  ctx.arc(100,100,100,0,Math.PI*2);
  ctx.clip();
  const drawX = (_edX - (EDITOR_SIZE/2 - CIRCLE_R)) * (200/(CIRCLE_R*2));
  const drawY = (_edY - (EDITOR_SIZE/2 - CIRCLE_R)) * (200/(CIRCLE_R*2));
  const drawW = _avatarEditImg.width  * _edScale * (200/(CIRCLE_R*2));
  const drawH = _avatarEditImg.height * _edScale * (200/(CIRCLE_R*2));
  ctx.drawImage(_avatarEditImg, drawX, drawY, drawW, drawH);
  const prevImg = document.getElementById('avatarPreviewImg');
  if(prevImg){
    prevImg.src = canvas.toDataURL('image/jpeg',0.85);
    prevImg.style.width='100%'; prevImg.style.height='100%';
    prevImg.style.objectFit='cover'; prevImg.style.position='static';
  }
}

function onZoomSlider(val){
  const newScale = parseFloat(val)/100;
  const cx = EDITOR_SIZE/2, cy = EDITOR_SIZE/2;
  _edX = cx - (cx - _edX) * (newScale/_edScale);
  _edY = cy - (cy - _edY) * (newScale/_edScale);
  _edScale = newScale;
  document.getElementById('zoomLabel').textContent = Math.round(_edScale*100)+'%';
  clampPosition();
  applyEditorTransform();
  updatePreview();
}

function resetAvatarEditor(){
  if(!_avatarEditImg) return;
  const fitScale = Math.max((CIRCLE_R*2)/_avatarEditImg.width,(CIRCLE_R*2)/_avatarEditImg.height);
  _edScale = fitScale;
  _edX = (EDITOR_SIZE - _avatarEditImg.width*_edScale)/2;
  _edY = (EDITOR_SIZE - _avatarEditImg.height*_edScale)/2;
  document.getElementById('zoomSlider').value = Math.round(_edScale*100);
  document.getElementById('zoomLabel').textContent = Math.round(_edScale*100)+'%';
  applyEditorTransform();
  updatePreview();
}

function setupEditorEvents(){
  const wrap = document.getElementById('avatarEditorWrap');
  if(!wrap) return;
  // Clone to remove old listeners
  const newWrap = wrap.cloneNode(true);
  wrap.parentNode.replaceChild(newWrap, wrap);
  // Re-attach img reference
  const edImg = document.getElementById('avatarEditorImg');

  // Mouse events
  newWrap.addEventListener('mousedown', e=>{
    _dragging=true; _lastTX=e.clientX; _lastTY=e.clientY;
    newWrap.style.cursor='grabbing'; e.preventDefault();
  });
  document.addEventListener('mousemove', e=>{
    if(!_dragging) return;
    _edX += e.clientX-_lastTX; _edY += e.clientY-_lastTY;
    _lastTX=e.clientX; _lastTY=e.clientY;
    clampPosition(); applyEditorTransform(); updatePreview();
  });
  document.addEventListener('mouseup', ()=>{ _dragging=false; newWrap.style.cursor='grab'; });

  // Wheel zoom
  newWrap.addEventListener('wheel', e=>{
    e.preventDefault();
    const delta = e.deltaY > 0 ? -0.05 : 0.05;
    const newScale = Math.max(0.5,Math.min(3,_edScale+delta));
    const cx=EDITOR_SIZE/2, cy=EDITOR_SIZE/2;
    _edX = cx-(cx-_edX)*(newScale/_edScale);
    _edY = cy-(cy-_edY)*(newScale/_edScale);
    _edScale=newScale;
    document.getElementById('zoomSlider').value=Math.round(_edScale*100);
    document.getElementById('zoomLabel').textContent=Math.round(_edScale*100)+'%';
    clampPosition(); applyEditorTransform(); updatePreview();
  },{passive:false});

  // Touch events for iOS
  newWrap.addEventListener('touchstart', e=>{
    if(e.touches.length===1){
      _dragging=true;
      _lastTX=e.touches[0].clientX; _lastTY=e.touches[0].clientY;
    } else if(e.touches.length===2){
      _dragging=false;
      _pinchDist=Math.hypot(
        e.touches[0].clientX-e.touches[1].clientX,
        e.touches[0].clientY-e.touches[1].clientY
      );
    }
    e.preventDefault();
  },{passive:false});

  newWrap.addEventListener('touchmove', e=>{
    if(e.touches.length===1 && _dragging){
      const dx=e.touches[0].clientX-_lastTX;
      const dy=e.touches[0].clientY-_lastTY;
      _edX+=dx; _edY+=dy;
      _lastTX=e.touches[0].clientX; _lastTY=e.touches[0].clientY;
      clampPosition(); applyEditorTransform(); updatePreview();
    } else if(e.touches.length===2){
      const newDist=Math.hypot(
        e.touches[0].clientX-e.touches[1].clientX,
        e.touches[0].clientY-e.touches[1].clientY
      );
      if(_pinchDist>0){
        const ratio=newDist/_pinchDist;
        const newScale=Math.max(0.5,Math.min(3,_edScale*ratio));
        const cx=(e.touches[0].clientX+e.touches[1].clientX)/2;
        const cy=(e.touches[0].clientY+e.touches[1].clientY)/2;
        const rect=newWrap.getBoundingClientRect();
        const lx=cx-rect.left, ly=cy-rect.top;
        _edX=lx-(lx-_edX)*(newScale/_edScale);
        _edY=ly-(ly-_edY)*(newScale/_edScale);
        _edScale=newScale;
        document.getElementById('zoomSlider').value=Math.round(_edScale*100);
        document.getElementById('zoomLabel').textContent=Math.round(_edScale*100)+'%';
        clampPosition(); applyEditorTransform(); updatePreview();
      }
      _pinchDist=newDist;
    }
    e.preventDefault();
  },{passive:false});

  newWrap.addEventListener('touchend', ()=>{ _dragging=false; _pinchDist=0; });
}

function confirmAvatarEdit(){
  if(!_avatarEditImg||!_avatarEditProfile) return;
  const canvas=document.createElement('canvas');
  canvas.width=300; canvas.height=300;
  const ctx=canvas.getContext('2d');
  ctx.beginPath();
  ctx.arc(150,150,150,0,Math.PI*2);

  const drawX=(_edX-(EDITOR_SIZE/2-CIRCLE_R))*(300/(CIRCLE_R*2));
  const drawY=(_edY-(EDITOR_SIZE/2-CIRCLE_R))*(300/(CIRCLE_R*2));
  const drawW=_avatarEditImg.width*_edScale*(300/(CIRCLE_R*2));
  const drawH=_avatarEditImg.height*_edScale*(300/(CIRCLE_R*2));

function updateProfileStats(){
  const now = new Date();
  const monday = new Date(now);
  monday.setDate(now.getDate() - ((now.getDay()+6)%7));
  monday.setHours(0,0,0,0);

  ['deivis','yona'].forEach(id=>{
    const data = AD[id]||{};

    // Weekly sessions
    let count = 0;
    for(let d=0;d<7;d++){
      const day = new Date(monday); day.setDate(monday.getDate()+d);
      const k = day.getFullYear()+'-'+String(day.getMonth()+1).padStart(2,'0')+'-'+String(day.getDate()).padStart(2,'0');
      if(data[k]&&data[k].session&&data[k].session!=='skip') count++;
    }
    const pct = Math.round((count/6)*100);

    // Streak
    let streak = 0;
    for(let i=0;i<365;i++){
      const d2 = new Date(now); d2.setDate(now.getDate()-i);
      const k = d2.getFullYear()+'-'+String(d2.getMonth()+1).padStart(2,'0')+'-'+String(d2.getDate()).padStart(2,'0');
      if(data[k]&&data[k].session&&data[k].session!=='skip') streak++;
      else if(i>0) break;
    }

    // Last known weight
    const wl = WD[id]||[];
    const lastKg = wl.length>0?wl[wl.length-1].val:88;

    // Update DOM — new IDs
    const bar    = document.getElementById('dp-bar-'+id);
    const pctEl  = document.getElementById('dp-pct-'+id);
    const strEl  = document.getElementById('dp-streak-'+id+'-val');
    const sessEl = document.getElementById('dp-sess-'+id+'-val');
    const kgEl   = document.getElementById('dp-kg-'+id+'-val');

    if(pctEl)  pctEl.textContent  = pct+'%';
    if(strEl)  strEl.textContent  = streak;
    if(sessEl) sessEl.textContent = count+'/6';
    if(kgEl)   kgEl.textContent   = lastKg;

function goTab(t){
  ['plan','tracker','volumen','perfil','progreso','fotos','calorias','suplementos','dieta'].forEach(tab=>{
    const tabEl=document.getElementById('tab-'+tab);
    const nbEl=document.getElementById('nb-'+tab);
    if(tabEl) tabEl.classList.toggle('active', tab===t);
    if(nbEl)  nbEl.classList.toggle('active', tab===t);
  });
  // Main nav buttons
  ['plan','tracker','dieta','calorias'].forEach(tab=>{
    const nbEl=document.getElementById('nb-'+tab);
    if(nbEl) nbEl.classList.toggle('active', tab===t);
  });
  // More button active if on a secondary tab
  const moreTabs=['volumen','perfil','progreso','fotos','suplementos'];
  const moreBtn=document.getElementById('nb-more');
  if(moreBtn) moreBtn.classList.toggle('active', moreTabs.includes(t));
  document.getElementById('tRight').textContent = t.toUpperCase();
  if(t==='plan')        renderPlan();
  if(t==='tracker')     { renderCal(); renderStats(); }
  if(t==='volumen')     renderVolumen();
  if(t==='perfil')      renderPerfil();

  if(t==='calorias')    renderCalorias();

  if(t==='dieta')       renderDieta();
}

// Week offset for weekly tracker (0 = current week)
let _weekOffset = 0;

function changeMonth(d){ _weekOffset += d; renderCal(); }

function getWeekDays(){
  const now = new Date();
  // Monday of current week
  const monday = new Date(now);
  monday.setDate(now.getDate() - ((now.getDay()+6)%7) + (_weekOffset*7));
  monday.setHours(0,0,0,0);
  const days = [];
  for(let i=0;i<7;i++){
    const d = new Date(monday);
    d.setDate(monday.getDate()+i);
    days.push(d);
  }
  return days;
}

function renderCal(){

function selDay(k){
  SK=k;

    if(!data[k]) data[k]={};

    // Auto-load learned exercises
    if(autoSess&&autoSess!=='skip'&&SESSIONS[autoSess]){
      const learned = getLearnedExercises(autoSess);
      if(learned){
        Object.keys(learned).forEach(secKey=>{
          if(!data[secKey]) data[secKey]=learned[secKey].map(e=>({...e,sets:'',reps:'',kg:''}));
        });
      }
    }
    AD[CP]=data; lsSave();

  renderCal();

function setSess(sid){
  const data=gd(); data[SK]=data[SK]||{}; data[SK].session=sid; data[SK].checked=data[SK].checked||{};
  // Auto-load learned exercises from last time this session type was done
  if(sid&&sid!=='skip'&&SESSIONS[sid]){
    const learned = getLearnedExercises(sid);
    if(learned){
      // Restore extra exercises per section from last time
      Object.keys(learned).forEach(secKey=>{
        if(!data[secKey]) data[secKey]=learned[secKey].map(e=>({...e,sets:'',reps:'',kg:''}));
      });
    }
  }
  sd(data); renderCal();
}

// Get exercises saved last time this session type was done
function getLearnedExercises(sessId){
  const data=gd();
  // Find most recent day with this session type (not today)
  const days = Object.keys(data).filter(k=>/^\d{4}-/.test(k)&&k!==SK&&data[k]&&data[k].session===sessId);
  if(!days.length) return null;
  days.sort(); const lastDay = days[days.length-1];
  const lastData = data[lastDay];
  // Extract all secKeys for this session
  const result={};
  if(SESSIONS[sessId]&&SESSIONS[sessId].sections){
    SESSIONS[sessId].sections.forEach(sec=>{
      const secKey='extra_'+lastDay+'_'+sec.t.replace(/\s+/g,'_');
      if(lastData[secKey]&&lastData[secKey].length>0){
        const newSecKey='extra_'+SK+'_'+sec.t.replace(/\s+/g,'_');
        result[newSecKey]=lastData[secKey];
      }
    });
  }
  return Object.keys(result).length?result:null;
}


// ── Split automático por día de la semana ──
const DAY_SPLIT = {
  0: 'espaldaA', // Domingo
  1: 'skip',     // Lunes
  2: 'brazoA',   // Martes
  3: 'espaldaA', // Miércoles
  4: 'pechoA',   // Jueves
  5: 'piernaA',  // Viernes
  6: 'brazoA',   // Sábado
};

function getAutoSession(dateKey){
  const parts = dateKey.split('-');
  const d = new Date(+parts[0], +parts[1]-1, +parts[2]);
  return DAY_SPLIT[d.getDay()] || 'skip';
}

// ── Series individuales por ejercicio ──
function saveSerie(exId, idx, field, value){
  const data=gd(); data[SK]=data[SK]||{};
  const key='series_'+SK+'_'+exId;
  if(!data[key]) data[key]=[];
  while(data[key].length<=idx) data[key].push({reps:'',kg:''});
  data[key][idx][field]=value;
  // Update lastPerf with best kg across all series
  if(!data._lastPerf) data._lastPerf={};
  const series=data[key].filter(s=>s.kg);
  if(series.length){
    const maxKg=Math.max(...series.map(s=>parseFloat(s.kg)||0));
    const bestSerie=series.find(s=>parseFloat(s.kg)===maxKg)||series[0];
    const prev=data._lastPerf[exId];
    if(!prev||maxKg>=(prev.kg||0)){
      data._lastPerf[exId]={sets:data[key].length,reps:bestSerie.reps,kg:maxKg,date:SK};
    }
  }
  sd(data);
  // Update volume cell inline without full re-render
  const vol=series.reduce((a,s)=>a+(parseFloat(s.reps)||0)*(parseFloat(s.kg)||0),0);
}

function addSerie(exId, sStr){
  const data=gd(); data[SK]=data[SK]||{};
  const key='series_'+SK+'_'+exId;
  if(!data[key]){
    const defaultSets=parseInt((sStr||'3').match(/^(\d+)/)?.[1]||'3');
    data[key]=Array(defaultSets).fill(null).map(()=>({reps:'',kg:''}));
  }
  data[key].push({reps:'',kg:''});
  sd(data); renderCal();
}

function deleteSerie(exId, idx){
  const data=gd(); data[SK]=data[SK]||{};
  const key='series_'+SK+'_'+exId;
  if(!data[key]||data[key].length<=1) return; // keep at least 1
  data[key].splice(idx,1);
  sd(data); renderCal();
}

function saveLog(exId, field, value){
  // Legacy — kept for compatibility
  const data=gd(); data[SK]=data[SK]||{};
  data[SK].logs=data[SK].logs||{};
  data[SK].logs[exId]=data[SK].logs[exId]||{};
  data[SK].logs[exId][field]=parseFloat(value)||0;
  sd(data);
}

function getLastPerf(exId){
  const data=gd();
  // First try new series-based lastPerf
  if(data._lastPerf&&data._lastPerf[exId]){
    const lp=data._lastPerf[exId];
    if(lp.date!==SK) return lp;
    // Today's entry — find previous
    const keys=Object.keys(data).filter(k=>/^\d{4}-/.test(k)&&k!==SK&&data[k]&&data['series_'+k+'_'+exId]);
    if(keys.length){
      keys.sort(); keys.reverse();
      const prevKey='series_'+keys[0]+'_'+exId;
      const prevSeries=(data[prevKey]||[]).filter(s=>s.kg);
      if(prevSeries.length){
        const maxKg=Math.max(...prevSeries.map(s=>parseFloat(s.kg)||0));
        const best=prevSeries.find(s=>parseFloat(s.kg)===maxKg)||prevSeries[0];
        return{sets:data[prevKey].length,reps:best.reps,kg:maxKg,date:keys[0]};
      }
    }
    return null;
  }
  // Fallback to old logs
  if(!data._lastPerf||!data._lastPerf[exId]) return null;
  return data._lastPerf[exId];
}

function filterExPicker(){
  const q = (document.getElementById('exPickerSearch').value||'').toLowerCase().trim();
  const list = document.getElementById('exPickerList');
  const p2 = CP ? pr() : {color:'#f5c542'};

  // Personal library — most recent first, deduplicated
  const myLib = [...new Set((EXLIB[CP]||[]).slice().reverse())];

  // Filter both lists
  const filteredLib = q ? myLib.filter(e=>e.toLowerCase().includes(q)) : myLib;
  const filteredSug = EX_SUGGESTED.filter(e=>
    (!q||e.toLowerCase().includes(q)) && !myLib.includes(e)
  );

  let html = '';

  // Custom entry if typed something not in lists
  if(q && !EX_SUGGESTED.some(e=>e.toLowerCase()===q) && !myLib.some(e=>e.toLowerCase()===q)){
    html += `<div onclick="pickExercise('${q.charAt(0).toUpperCase()+q.slice(1)}')"

  if(filteredLib.length){
    html += `<div style="font-size:9px;color:#555;text-transform:uppercase;letter-spacing:.12em;margin-bottom:6px;margin-top:4px;">📚 Mi biblioteca</div>`;

  if(filteredSug.length){

function exPickerItem(name, color, isPersonal){
  const safe = name.replace(/'/g,"\'").replace(/"/g,'&quot;');
  return `<div onclick="pickExercise('${safe}')"

function pickExercise(name){
  if(!_exPickerSecKey||!name) return;
  // Save to personal library
  if(!EXLIB[CP]) EXLIB[CP]=[];
  // Remove if exists then push to end (most recent)
  EXLIB[CP] = EXLIB[CP].filter(e=>e!==name);
  EXLIB[CP].push(name);
  // Keep max 50 entries
  if(EXLIB[CP].length>50) EXLIB[CP]=EXLIB[CP].slice(-50);
  lsSave();
  // Add to day
  const data=gd();
  data[_exPickerSecKey]=data[_exPickerSecKey]||[];
  data[_exPickerSecKey].push({name,sets:'',reps:'',kg:''});
  sd(data); lsSave();
  closeExPicker();
  renderCal();
}

function updateExtra(secKey, idx, field, value){
  const data=gd(); if(!data[secKey])return;
  data[secKey][idx]=data[secKey][idx]||{};
  data[secKey][idx][field]=field==='name'?value:parseFloat(value)||0;

}

function deleteExtra(secKey, idx){
  const data=gd(); if(!data[secKey])return;
  data[secKey].splice(idx,1); sd(data); lsSave(); renderCal();
}

function calcIMC(){
  const w=parseFloat(document.getElementById('imcP')?.value);
  const hh=parseFloat(document.getElementById('imcH')?.value);
  const out=document.getElementById('imcOut'); if(!out)return;
  if(!w||!hh||hh<1){out.style.display='none';return;}
  const imc=w/(hh*hh), imin=18.5*hh*hh, imax=24.9*hh*hh, imid=(imin+imax)/2;
  const diff=(w-imid).toFixed(1);
  let cat,cc;
  if(imc<18.5){cat='Bajo Peso';cc='#3b82f6';}
  else if(imc<25){cat='✓ Peso Normal';cc='#4ade80';}
  else if(imc<30){cat='Sobrepeso';cc='#facc15';}
  else if(imc<35){cat='Obesidad I';cc='#ff6b35';}
  else{cat='Obesidad II+';cc='#ef4444';}
  const pct=Math.min(100,Math.max(0,((imc-15)/25)*100));
  document.getElementById('imcRes').innerHTML=
    `<div class="imc-m"><div class="imc-v" style="color:${pr().color}">${imc.toFixed(1)}</div><div class="imc-l">IMC</div></div>
     <div class="imc-m"><div class="imc-v" style="color:#69F0AE">${imin.toFixed(0)}-${imax.toFixed(0)}kg</div><div class="imc-l">Peso Ideal</div></div>
     <div class="imc-m"><div class="imc-v" style="color:${Math.abs(diff)<3?'#4ade80':parseFloat(diff)>0?'#ff6b35':'#3b82f6'}">${(diff>0?'+':'')+diff}kg</div><div class="imc-l">Diferencia</div></div>`;
  document.getElementById('imcMk').style.left=pct+'%';
  const ce=document.getElementById('imcCat'); ce.textContent=cat; ce.style.color=cc;
  out.style.display='block';
}

function getMacros(){
  if(!CP)return null;
  const p=pr();
  const w=parseFloat(document.getElementById('imcP')?.value)||p.w||88;
  const act=parseFloat(document.getElementById('mAct')?.value)||1.725;
  const goal=document.getElementById('mGoal')?.value||'recomp';
  const bmr=10*w+6.25*(p.h*100)-5*p.age+5;
  const tdee=Math.round(bmr*act);
  let kcal,protein,fat;
  if(goal==='cut'){kcal=tdee-400;protein=Math.round(w*2.4);fat=Math.round(w*0.9);}
  else if(goal==='bulk'){kcal=tdee+300;protein=Math.round(w*2.2);fat=Math.round(w*1.0);}
  else if(goal==='maint'){kcal=tdee;protein=Math.round(w*2.0);fat=Math.round(w*0.9);}
  else{kcal=tdee-150;protein=Math.round(w*2.3);fat=Math.round(w*0.9);}
  const carbs=Math.max(80,Math.round((kcal-protein*4-fat*9)/4));
  return{kcal,protein,carbs,fat,tdee,peso:w};
}

function calcMacros(){
  const m=getMacros(); if(!m)return;
  const p=pr(); const el=document.getElementById('macroRes'); if(!el)return;
  el.innerHTML=`
    <div class="macro-card"><div class="macro-v" style="color:${p.color}">${m.kcal}</div><div class="macro-l">Calorías</div><div class="macro-s">TDEE: ${m.tdee}</div></div>
    <div class="macro-card"><div class="macro-v" style="color:#FF5252">${m.protein}g</div><div class="macro-l">Proteína</div><div class="macro-s">${(m.protein/m.peso).toFixed(1)}g/kg</div></div>
    <div class="macro-card"><div class="macro-v" style="color:#facc15">${m.carbs}g</div><div class="macro-l">Carbos</div><div class="macro-s">Post-entreno</div></div>
    <div class="macro-card"><div class="macro-v" style="color:#448AFF">${m.fat}g</div><div class="macro-l">Grasas</div><div class="macro-s">Mín 0.8g/kg</div></div>`;
}

function renderProgreso(){
  const p=pr(); const wl=gw(); const data=gd();

  // ── Streak ──
  let streak=0;
  for(let i=0;i<365;i++){const d2=new Date(NOW);d2.setDate(NOW.getDate()-i);const k=dk(d2);const dd=data[k];if(dd&&dd.session&&dd.session!=='skip'&&SESSIONS[dd.session])streak++;else if(i>0)break;}
  const sub=streak===0?'Empieza a entrenar para construir tu racha.':streak<7?`${streak} días. ¡Sigue así!`:`¡${streak} días consecutivos! Brutal 🔥`;

  // ── Peso: tendencia y proyección ──
  const pesoInicial = wl.length>0?wl[0].val:p.w;
  const pesoActual  = wl.length>0?wl[wl.length-1].val:p.w;
  const perdido     = +(pesoInicial - pesoActual).toFixed(1);
  // Velocidad de pérdida: kg/semana basado en historial o estimado
  let kgSem = 0;
  if(wl.length>=2){
    const diffDias=(new Date(wl[wl.length-1].raw||NOW)-new Date(wl[0].raw||NOW))/(1000*60*60*24)||1;
    kgSem = +((perdido/diffDias)*7).toFixed(2);
  }
  const kgSemEstim = kgSem>0?kgSem:0.3; // recomposición típica ~0.3kg/sem
  // Proyección 4, 8, 12 semanas
  const proj4  = +(pesoActual - kgSemEstim*4).toFixed(1);
  const proj8  = +(pesoActual - kgSemEstim*8).toFixed(1);
  const proj12 = +(pesoActual - kgSemEstim*12).toFixed(1);
  const imcActual = +(pesoActual/(p.h*p.h)).toFixed(1);

    <div class="chart-area" id="chWrap"></div>

      const wc=document.getElementById('weightChart'); if(!wc)return;
      const vals=wl.map(w=>w.val);
      const mn=Math.min(...vals)-1, mx2=Math.max(...vals)+1;
      const H=62;
      vals.forEach((v,i)=>{
        const h2=Math.round(((v-mn)/(mx2-mn))*H);
        const col=i===vals.length-1?pr().color:'#3b82f6';
        const bar=document.createElement('div');
        bar.style.cssText=`flex:1;height:${h2}px;background:${col};border-radius:2px 2px 0 0;position:relative;`;

        bar.appendChild(lbl);
        wc.appendChild(bar);
      });

}

function addW(){
  const v=parseFloat(document.getElementById('wInp').value);
  if(!v||v<30||v>300)return;
  const now2=new Date();
  const d=now2.toLocaleDateString('es-ES',{day:'numeric',month:'short',year:'numeric'});
  gw().push({date:d,val:v,raw:now2.toISOString()});
  lsSave();
  renderProgreso();renderChart();
}
function delW(i){gw().splice(i,1);lsSave();renderProgreso();renderChart();}

function renderChart(){
  const data=gd(); const wrap=document.getElementById('chWrap'); if(!wrap)return;
  wrap.innerHTML='';
  const weeks=[];
  for(let w=7;w>=0;w--){
    const ws=new Date(NOW); ws.setDate(NOW.getDate()-NOW.getDay()-w*7+1);
    let push=0,pull=0,legs=0;
    for(let d2=0;d2<7;d2++){const dd2=new Date(ws);dd2.setDate(ws.getDate()+d2);const k=dk(dd2);const kd=data[k];if(!kd?.session||kd.session==='skip')continue;const t=SESSIONS[kd.session]?.type;if(t==='push')push++;else if(t==='pull')pull++;else if(t==='legs')legs++;}
    weeks.push({lbl:`${ws.getDate()}/${ws.getMonth()+1}`,push,pull,legs});
  }
  const mx=Math.max(2,...weeks.flatMap(w=>[w.push,w.pull,w.legs]));
  const H=115;
  weeks.forEach(w=>{
    const col=document.createElement('div'); col.className='chart-col';
    const bars=document.createElement('div'); bars.className='chart-bars';
    [[w.push,'#dd0060'],[w.pull,'#0066aa'],[w.legs,'#6600bb']].forEach(([v,c])=>{
      const b=document.createElement('div'); b.className='chart-bar';
      b.style.background=c; b.style.height=(v>0?Math.round((v/mx)*H):0)+'px';
      bars.appendChild(b);
    });
    const lbl=document.createElement('div'); lbl.className='chart-label'; lbl.textContent=w.lbl;
    col.appendChild(bars); col.appendChild(lbl); wrap.appendChild(col);
  });
}

function startNewWeek(){
  const p=pr();
  const wl=WD[CP];
  const peso=wl.length>0?wl[wl.length-1].val:'';
  const photos=PD[CP]||[];
  const weekNum = Math.floor(photos.length/3)+1;
  const today2=new Date();
  const label=`Semana ${weekNum} — ${today2.toLocaleDateString('es-ES',{day:'numeric',month:'short',year:'numeric'})}`;
  // Just pick photos for this week
  addPhoto(label,'Frente');
}

function addPhoto(week, angle){
  const input=document.getElementById('iosPhotoInput');
  input.accept='image/*';
  input._week=week; input._angle=angle;
  input.value='';
  input.onchange=e=>{
    const file=e.target.files[0]; if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      if(!PD[CP])PD[CP]=[];
      // Remove existing photo for same week+angle
      const idx=PD[CP].findIndex(p=>p.week===week&&p.angle===angle);
      const wl=WD[CP];
      const peso=wl.length>0?wl[wl.length-1].val:'';
      const entry={week,angle,src:ev.target.result,date:new Date().toLocaleDateString('es-ES',{day:'numeric',month:'short',year:'numeric'}),peso};
      if(idx>=0)PD[CP][idx]=entry; else PD[CP].push(entry);
      lsSave();
      renderFotos();
    };
    reader.readAsDataURL(file);
  };
  input.click();
}

function viewPhoto(week, angle){
  const photos=PD[CP]||[];
  const ph=photos.find(p=>p.week===week&&p.angle===angle);
  if(!ph)return;
  const lb=document.getElementById('photoLightbox');
  document.getElementById('lightboxImg').src=ph.src;
  document.getElementById('lightboxLabel').textContent=`${week} · ${angle}`;
  lb.style.display='flex';
}

function closeLightbox(){
  const lb=document.getElementById('photoLightbox');
  if(lb)lb.style.display='none';
}

function deleteWeek(week){
  if(!confirm('¿Eliminar todas las fotos de '+week+'?'))return;
  PD[CP]=(PD[CP]||[]).filter(p=>p.week!==week);
  lsSave();
  renderFotos();
}

  const p=pr(); const m=getMacros();
  const log=getTodayLog();

  const totP=meals.reduce((a,x)=>a+(x.p||0),0);
  const totC=meals.reduce((a,x)=>a+(x.c||0),0);
  const totF=meals.reduce((a,x)=>a+(x.f||0),0);

  const goalKcal=m?m.kcal:2500;
  const goalP=m?m.protein:180;
  const goalC=m?m.carbs:250;
  const goalF=m?m.fat:80;

  const pctKcal=Math.min(100,Math.round((totKcal/goalKcal)*100));
  const pctP=Math.min(100,Math.round((totP/goalP)*100));
  const pctC=Math.min(100,Math.round((totC/goalC)*100));
  const pctF=Math.min(100,Math.round((totF/goalF)*100));

let _currentMealType='Extra';
function openFoodSearch(mealType){
  _currentMealType=mealType;
  document.getElementById('modalTitle').textContent='Añadir a '+mealType;
  document.getElementById('foodSearch').value='';
  document.getElementById('customKcal').value='';
  document.getElementById('customP').value='';
  document.getElementById('customC').value='';
  filterFoods();
  document.getElementById('foodModal').style.display='flex';
}
function closeFoodModal(){
  document.getElementById('foodModal').style.display='none';
}
function filterFoods(){
  const q=(document.getElementById('foodSearch').value||'').toLowerCase();
  const list=document.getElementById('foodList');
  const p2=pr();
  const filtered=q?FOOD_DB.filter(f=>f.n.toLowerCase().includes(q)):FOOD_DB;
  list.innerHTML=filtered.slice(0,20).map(f=>`
    <div onclick="addFoodItem('${f.n}',${f.kcal},${f.p},${f.c},${f.f})"
      style="padding:9px 12px;background:var(--card2);border-radius:8px;border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:space-between;">
      <div>
        <div style="font-size:12px;font-weight:500;">${f.n}</div>
        <div style="font-size:10px;color:var(--muted);margin-top:2px;">P:${f.p}g · C:${f.c}g · G:${f.f}g</div>
      </div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:1rem;color:${p2.color};flex-shrink:0;margin-left:10px;">${f.kcal}</div>
    </div>`).join('');

  // Custom add button
  const name=document.getElementById('foodSearch').value;
  const kcal=parseFloat(document.getElementById('customKcal').value)||0;
  if(name&&kcal){
    list.innerHTML+=`<div onclick="addCustomFood()"
      style="padding:9px 12px;background:rgba(200,241,53,.08);border-radius:8px;border:1px dashed rgba(200,241,53,.3);cursor:pointer;text-align:center;margin-top:4px;">
      <div style="font-size:12px;color:#cc5500;font-weight:500;">+ Añadir "${name}" · ${kcal} kcal</div>
    </div>`;
  }
}
function addFoodItem(name,kcal,p2,c,f){
  const log=getTodayLog();
  log.meals.push({name,kcal,p:p2,c,f,meal:_currentMealType});
  lsSave(); closeFoodModal(); renderCalorias();
}
function addCustomFood(){
  const name=document.getElementById('foodSearch').value||'Alimento personalizado';
  const kcal=parseFloat(document.getElementById('customKcal').value)||0;
  const p2=parseFloat(document.getElementById('customP').value)||0;
  const c=parseFloat(document.getElementById('customC').value)||0;
  const f=0;
  addFoodItem(name,kcal,p2,c,f);
}
function removeMeal(idx){
  const log=getTodayLog(); log.meals.splice(idx,1); lsSave(); renderCalorias();
}
function setWater(n){
  const log=getTodayLog(); log.water=n; lsSave(); renderCalorias();
}

function renderSups(view){
  const p=pr();
  const today2=new Date();
  const ds=`${DAYS_ES[today2.getDay()]} ${today2.getDate()} de ${MONTHS_ES[today2.getMonth()]}`;
  let h=`<div class="inner">
  <div style="display:flex;align-items:center;gap:10px;padding:10px 0 14px;position:sticky;top:0;z-index:10;background:rgba(255,238,245,0.96);border-bottom:1px solid #252525;margin-bottom:14px;">
    <button onclick="goTab('plan')" style="display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.7);border:1px solid rgba(0,0,0,.1);border-radius:8px;color:#7a6070;font-size:12px;padding:5px 10px;cursor:pointer;font-family:'DM Sans',sans-serif;">‹ Atrás</button>

    <button class="sup-tab${view==='stack'?' active':''}" onclick="renderSups('stack')">Stack completo</button>
    <button class="sup-tab${view==='horario'?' active':''}" onclick="renderSups('horario')">Horario diario</button>
    <button class="sup-tab${view==='checklist'?' active':''}" onclick="renderSups('checklist')">Checklist</button>
  </div>`;

  if(view==='stack'){
    h+=`<div class="section-label">Prioridad alta — impacto real y probado</div>`;
    SUPS.filter(s=>s.p===1).forEach(s=>h+=supCard(s));
    h+=`<div class="section-label" style="margin-top:14px;">Prioridad media — optimizadores con evidencia</div>`;
    SUPS.filter(s=>s.p===2).forEach(s=>h+=supCard(s));
    h+=`<div class="section-label" style="margin-top:14px;">Evidencia débil o condicional</div>`;
    SUPS.filter(s=>s.p===3).forEach(s=>h+=supCard(s));
  }

  if(view==='horario'){
    h+=`<div class="card"><div style="overflow:hidden;">`;
    HORARIO.forEach((row,ri)=>{
      h+=`<div class="tl-row" style="${ri===HORARIO.length-1?'border:none':''}">
        <div class="tl-time">${row.time}</div>
        <div class="tl-items">`;
      row.items.forEach(item=>{
        h+=`<div class="tl-item"><div class="tl-dot" style="background:${item.color}"></div><span class="tl-name">${item.name}</span><span class="tl-dose">${item.dose}</span></div>`;
      });
      h+=`</div></div>`;
    });
    h+=`</div></div>
    <div class="card" style="margin-top:12px;"><div class="card-body">
      <div class="section-label">Días de descanso</div>
      <div style="font-size:12px;color:var(--muted);line-height:1.7;">
        Creatina, vitaminas y omega-3 se toman igual todos los días.<br>
        Sin cafeína ni citrulina si no entrenas.<br>
        Ashwagandha y magnesio de noche como siempre.
      </div>
    </div></div>`;
  }

  if(view==='checklist'){
    const sc=SC[CP]||{};
    const total=CHK_ITEMS.length;
    const done=CHK_ITEMS.filter((_,i)=>sc[i]).length;
    const pct=Math.round((done/total)*100);
    h+=`<div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;">${ds}</div>
    <div class="prog-bar-row">
      <div class="prog-bar-bg"><div class="prog-bar-fill" style="width:${pct}%"></div></div>
      <span class="prog-bar-lbl">${done} / ${total}</span>
    </div>`;
    if(done===total&&total>0){h+=`<div style="padding:9px 12px;background:rgba(0,255,136,.1);border-radius:8px;font-size:12px;color:#69F0AE;font-weight:600;text-align:center;margin-bottom:10px;">Stack completo del día ✓</div>`;}
    CHK_ITEMS.forEach((item,i)=>{
      const checked=sc[i];
      h+=`<div class="chk-item" onclick="toggleSup(${i})">
        <div class="chk-box${checked?' on':''}">${checked?'<svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 7L9 1" stroke="#0a0a0a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>':''}</div>
        <div style="flex:1;"><div class="chk-name" style="${checked?'text-decoration:line-through;color:var(--muted)':''}">${item.name}</div><div class="chk-sub">${item.sub}</div></div>

      </div>`;
    });
  }
  h+='</div>';
  document.getElementById('tab-suplementos').innerHTML=h;
}

function supCard(s){
  const tags=s.tags.map(t=>`<span class="sup-tag" style="background:${s.color}20;color:${s.color}">${t}</span>`).join('');
  return `<div class="sup-card">
    <div class="sup-accent" style="background:${s.color}"></div>
    <div class="sup-inner">
      <div style="position:absolute;top:10px;right:10px;"><span class="sup-verdict" style="background:${s.vbg};color:${s.vc}">${s.verdict}</span></div>
      <div class="sup-name">${s.name}</div>
      <div class="sup-dose">${s.dose}</div>
      <div style="margin-bottom:7px;">${tags}</div>
      <div class="sup-why" style="border-color:${s.color}">${s.why}</div>
      <div style="font-size:10px;color:var(--muted);margin-top:6px;">🕐 ${s.time}</div>
    </div>
  </div>`;
}

function toggleSup(i){
  if(!SC[CP])SC[CP]={};
  SC[CP][i]=!SC[CP][i];
  lsSave();
  renderSups('checklist');
}

let _db = null;
let _firebaseReady = false;
let _saveTimer = null;
let _saving = false;
let _pendingSave = false;

function initFirebase(){
  return new Promise((resolve) => {
    if(_firebaseReady){ resolve(); return; }
    const scripts = [
      'https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js',
      'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js'
    ];
    let loaded = 0;
    scripts.forEach(src => {
      const s = document.createElement('script');
      s.src = src;
      s.onload = () => {
        loaded++;
        if(loaded === scripts.length){
          firebase.initializeApp(FIREBASE_CONFIG);
          _db = firebase.firestore();
          _firebaseReady = true;
          resolve();
        }
      };
      document.head.appendChild(s);
    });
  });
}

function showSyncStatus(state){
  let el = document.getElementById('syncBadge');
  if(!el){
    el = document.createElement('div'); el.id = 'syncBadge';
    el.style.cssText = 'position:fixed;bottom:72px;right:12px;z-index:9999;padding:5px 11px;border-radius:20px;font-size:10px;font-weight:600;font-family:"DM Sans",sans-serif;letter-spacing:.06em;pointer-events:none;transition:opacity .5s;border:1px solid;box-shadow:0 2px 10px rgba(0,0,0,.3);';
    document.body.appendChild(el);
  }
  const S = {
    saving: { bg:'rgba(250,204,21,.15)', color:'#facc15', border:'rgba(250,204,21,.3)', txt:'\u23eb Guardando...' },
    saved:  { bg:'rgba(74,222,128,.12)', color:'#4ade80', border:'rgba(74,222,128,.3)', txt:'\u2601\ufe0f Sincronizado' },
    error:  { bg:'rgba(255,107,53,.12)', color:'#ff6b35', border:'rgba(255,107,53,.3)', txt:'\u26a0\ufe0f Sin conexi\u00f3n \u2014 local' },
    loading:{ bg:'rgba(0,102,170,.12)',  color:'#448AFF', border:'rgba(0,102,170,.3)',  txt:'\u2b07\ufe0f Cargando...' },
  };
  const s = S[state] || S.saved;
  el.style.background = s.bg; el.style.color = s.color; el.style.borderColor = s.border;
  el.textContent = s.txt; el.style.opacity = '1';
  if(state === 'saved') setTimeout(()=>{ el.style.opacity = '0'; }, 3000);
}

function cloudSave(){
  if(_saveTimer) clearTimeout(_saveTimer);
  _saveTimer = setTimeout(async () => {
    if(_saving){ _pendingSave = true; return; }
    _saving = true;
    showSyncStatus('saving');
    try {
      await initFirebase();
      for(const profileId of ['deivis','yona']){
        const profileData = {
          AD: AD[profileId] || {},
          WD: WD[profileId] || [],
          SC: SC[profileId] || {},
          CALS: CALS[profileId] || {},
          EXLIB: EXLIB[profileId] || [],
          updatedAt: new Date().toISOString()
        };
        await _db.collection('gemfit').doc(profileId).set(profileData, { merge: true });
      }
      showSyncStatus('saved');
    } catch(e) {
      console.warn('CloudSave error:', e);
      showSyncStatus('error');
    } finally {
      _saving = false;
      if(_pendingSave){ _pendingSave = false; cloudSave(); }
    }
  }, 2000);
}

async function cloudLoad(){
  try {
    showSyncStatus('loading');
    await initFirebase();
    for(const profileId of ['deivis','yona']){
      const doc = await _db.collection('gemfit').doc(profileId).get();
      if(!doc.exists) continue;
      const data = doc.data();
      if(data.AD)    AD[profileId]    = data.AD;
      if(data.WD)    WD[profileId]    = data.WD;
      if(data.SC)    SC[profileId]    = data.SC;
      if(data.CALS)  CALS[profileId]  = data.CALS;
      if(data.EXLIB) EXLIB[profileId] = data.EXLIB;
    }
    localStorage.setItem('gemfit_v1', JSON.stringify({ AD, WD, SC, PD, CALS, AVATARS, EXLIB }));
    showSyncStatus('saved');
    return true;
  } catch(e) {
    console.warn('CloudLoad error:', e);
    showSyncStatus('error');
    return false;
  }
}

let _selectedDietaDay = null;

function selectDietaDay(dayKey){
  const p = pr();
  const DIAS = ['domingo','lunes','martes','miercoles','jueves','viernes','sabado'];
  const todayIdx = new Date().getDay();
  const todayKey = DIAS[todayIdx];
  _selectedDietaDay = dayKey;

  // Update button styles
  DIAS.forEach(d=>{
    const btn = document.getElementById('diet-day-btn-'+d);
    if(!btn) return;
    const isSelected = d===dayKey;
    const isToday = d===todayKey;
    btn.style.border = isSelected ? '1px solid '+p.color : '1px solid var(--border)';
    btn.style.background = isSelected ? p.color+'25' : 'transparent';
    const labels = btn.querySelectorAll('div');
    labels.forEach(l => l.style.color = isSelected ? p.color : isToday ? p.color+'99' : 'var(--muted)');
  });

  renderDietaDay(dayKey);
}

  </div>`;

  // Pre entreno card
  h+=`<div style="padding:12px 14px;background:rgba(204,85,0,.07);border:1px solid rgba(204,85,0,.2);border-radius:12px;margin-bottom:14px;">
    <div style="font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:.06em;color:#cc5500;margin-bottom:4px;">💪 PRE ENTRENO (días de gym)</div>

    <div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid rgba(204,85,0,.1);">
      <div>
        <div style="font-size:12px;font-weight:500;">${i.n}</div>
        <div style="font-size:10px;color:var(--muted);">${i.g} · P:${i.p}g · C:${i.c}g</div>
      </div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:1rem;color:#cc5500;">${i.kcal} kcal</div>

  </div>`;

  // Comidas del día
  const MEAL_COLORS = ['#ff6b35','#facc15','#4ade80','#448AFF','#a855f7'];
  plan.comidas.forEach((comida, ci)=>{
    const mc = MEAL_COLORS[ci % MEAL_COLORS.length];
    const mKcal = comida.items.reduce((a,i)=>a+i.kcal,0);
    h+=`<div style="background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden;">

          <div style="font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:.06em;color:${mc};">${comida.nombre}</div>

        </div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:${mc};">${Math.round(mKcal)} kcal</div>
      </div>`;

    comida.items.forEach((item,ii)=>{
      if(!item.n) return;
      h+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 14px;${ii<comida.items.length-1?'border-bottom:1px solid var(--border)':''}">
        <div style="flex:1;">
          <div style="font-size:12px;font-weight:500;">${item.n}</div>
          <div style="font-size:10px;color:var(--muted);margin-top:2px;">${item.g?item.g+' · ':''}P:${item.p||0}g · C:${item.c||0}g · G:${item.f||0}g</div>
        </div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:1rem;color:${p.color};flex-shrink:0;margin-left:10px;">${item.kcal} kcal</div>
      </div>`;
    });
    h+=`</div>`;
  });

  // Nota suplementos cena
  h+=`<div style="padding:10px 13px;background:rgba(74,222,128,.06);border:1px solid rgba(74,222,128,.2);border-radius:9px;font-size:11px;color:var(--muted2);line-height:1.6;margin-top:4px;">
    💊 <strong style="color:#4ade80">Siempre en la cena:</strong> 1 Omega 3 + 1 Primrose + 1 Cúrcuma<br>
    🏃 <strong style="color:#facc15">Antes del cardio en ayunas:</strong> 3g Carnitina + 1 Termogénico
  </div>`;

  document.getElementById('dietaDayContent').innerHTML = h;

  // Update day selector highlight
  const DIAS = ['domingo','lunes','martes','miercoles','jueves','viernes','sabado'];
  // Re-highlight selected day buttons
}

// ═══════════════════════════════════════════════════════════════
// CRONÓMETRO DE DESCANSO
// ═══════════════════════════════════════════════════════════════
let _restInterval = null;
let _restSeconds = 0;
let _restRunning = false;

function startRestTimer(){
  const btn = document.getElementById('restTimerBtn');
  const dot = document.getElementById('restTimerDot');
  const p2 = CP ? pr() : {color:'#cc5500'};
  if(_restRunning){
    // Pause
    clearInterval(_restInterval);
    _restRunning = false;
    if(dot) dot.style.background = 'var(--muted)';
    if(btn){ btn.textContent = '▶ Iniciar'; btn.style.background = p2.color+'18'; }
    return;
  }
  // Start — reset seconds and begin
  _restRunning = true;
  _restSeconds = 0;
  if(dot){ dot.style.background = p2.color; }
  if(btn){ btn.textContent = '⏸ Pausar'; btn.style.background = p2.color+'30'; }
  clearInterval(_restInterval);
  _restInterval = setInterval(()=>{
    _restSeconds++;
    const m = Math.floor(_restSeconds/60);
    const s = String(_restSeconds%60).padStart(2,'0');
    const disp = document.getElementById('restTimerDisplay');
    if(disp){
      disp.textContent = m+':'+s;
      if(_restSeconds >= 120) disp.style.color = '#ff6b35';
      else if(_restSeconds >= 90) disp.style.color = '#facc15';
      else disp.style.color = p2.color;
    }
  }, 1000);
}

function resetRestTimer(){
  clearInterval(_restInterval);
  _restRunning = false;
  _restSeconds = 0;
  const disp = document.getElementById('restTimerDisplay');
  const dot  = document.getElementById('restTimerDot');
  const btn  = document.getElementById('restTimerBtn');
  if(disp){ disp.textContent = '0:00'; disp.style.color = 'var(--muted)'; }
  if(dot)  dot.style.background = 'var(--muted)';
  if(btn){ btn.textContent = '▶ Iniciar'; }
}
